<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<title>AI — Astro CRM</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{background:#0a0a0a;font-family:'Segoe UI',system-ui,sans-serif;color:#fff;height:100%;overflow:hidden;touch-action:manipulation;}

.layout{display:flex;flex-direction:column;height:100%;position:fixed;inset:0;}

/* topbar */
.topbar{display:flex;align-items:center;padding:.85rem 1rem;border-bottom:1px solid rgba(255,255,255,.06);background:rgba(10,10,10,.97);flex-shrink:0;gap:.75rem;}
.back{width:32px;height:32px;border-radius:9px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;flex-shrink:0;text-decoration:none;}
.back i{font-size:.78rem;color:rgba(255,255,255,.5);}
.tb-center{flex:1;}
.tb-title{font-size:.9rem;font-weight:700;}
.tb-sub{font-size:.58rem;color:rgba(255,255,255,.28);margin-top:.08rem;}
.mode-row{display:flex;gap:.35rem;}
.mode-btn{padding:.28rem .65rem;border-radius:7px;font-size:.62rem;font-weight:700;letter-spacing:.5px;border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.28);background:transparent;transition:all .15s;}
.mode-btn.active-gpt{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.18);color:#fff;}
.mode-btn.active-worm{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.25);color:#ef4444;}
.clear-btn{width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.clear-btn i{font-size:.72rem;color:rgba(255,255,255,.3);}

/* messages */
.msgs{flex:1;overflow-y:auto;padding:.9rem 1rem;display:flex;flex-direction:column;gap:.7rem;overscroll-behavior:contain;}
.msgs::-webkit-scrollbar{width:2px;}
.msgs::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px;}

/* welcome */
.welcome{text-align:center;padding:2.5rem 1.5rem;display:flex;flex-direction:column;align-items:center;gap:.5rem;}
.wico{width:52px;height:52px;border-radius:14px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;margin-bottom:.5rem;}
.wico i{font-size:1.2rem;color:rgba(255,255,255,.4);}
.w-title{font-size:1rem;font-weight:700;}
.w-sub{font-size:.7rem;color:rgba(255,255,255,.28);line-height:1.5;}
.quick-list{display:flex;flex-direction:column;gap:.4rem;width:100%;margin-top:.5rem;}
.qp{background:#111;border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:.62rem .9rem;font-size:.75rem;color:rgba(255,255,255,.55);text-align:left;transition:background .15s;}
.qp:active{background:rgba(255,255,255,.07);}

/* bubbles */
.msg{display:flex;gap:.55rem;max-width:88%;}
.msg.user{align-self:flex-end;flex-direction:row-reverse;}
.msg.bot{align-self:flex-start;}
.av{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;flex-shrink:0;margin-top:2px;}
.msg.bot .av{background:rgba(255,255,255,.08);}
.msg.user .av{background:rgba(255,255,255,.06);color:rgba(255,255,255,.4);}
.av i{font-size:.7rem;color:rgba(255,255,255,.45);}
.bubble{padding:.65rem .88rem;border-radius:13px;font-size:.82rem;line-height:1.6;word-break:break-word;}
.msg.user .bubble{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-bottom-right-radius:3px;color:#e8e8e8;}
.msg.bot  .bubble{background:#111;border:1px solid rgba(255,255,255,.07);border-bottom-left-radius:3px;color:rgba(255,255,255,.75);}
.msg.bot.worm .bubble{border-color:rgba(239,68,68,.15);background:rgba(239,68,68,.04);}
.msg-time{font-size:.55rem;color:rgba(255,255,255,.2);margin-top:.2rem;padding:0 .1rem;}
.msg.user .msg-time{text-align:right;}

/* typing */
.typing{display:flex;align-items:center;gap:.35rem;padding:.6rem .88rem;background:#111;border:1px solid rgba(255,255,255,.07);border-radius:13px;border-bottom-left-radius:3px;width:fit-content;}
.td{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.35);animation:tdAnim 1.1s ease infinite;}
.td:nth-child(2){animation-delay:.18s;}
.td:nth-child(3){animation-delay:.36s;}
@keyframes tdAnim{0%,60%,100%{opacity:.2;transform:scale(.8)}30%{opacity:1;transform:scale(1)}}

/* input */
.input-area{padding:.7rem .9rem;border-top:1px solid rgba(255,255,255,.06);background:rgba(10,10,10,.97);padding-bottom:calc(.7rem + env(safe-area-inset-bottom));flex-shrink:0;}
.input-row{display:flex;gap:.55rem;align-items:flex-end;}
.ai-input{flex:1;padding:.7rem .88rem;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:11px;color:#fff;font-size:.85rem;resize:none;outline:none;max-height:110px;min-height:40px;line-height:1.4;font-family:inherit;transition:border-color .2s;}
.ai-input:focus{border-color:rgba(255,255,255,.18);}
.ai-input::placeholder{color:rgba(255,255,255,.18);}
.send-btn{width:40px;height:40px;border-radius:11px;background:#fff;border:none;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s,transform .1s;}
.send-btn:active{opacity:.8;transform:scale(.92);}
.send-btn:disabled{opacity:.3;}
.send-btn i{font-size:.85rem;color:#0a0a0a;}

/* navbar — sits under input, fixed */
.navbar{position:fixed;bottom:.8rem;left:50%;transform:translateX(-50%);display:flex;gap:.15rem;background:rgba(14,14,14,.97);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.07);border-radius:18px;padding:.42rem .45rem;z-index:200;box-shadow:0 8px 40px rgba(0,0,0,.7);}
.ni{display:flex;flex-direction:column;align-items:center;gap:.16rem;padding:.38rem .6rem;border-radius:10px;color:rgba(255,255,255,.28);text-decoration:none;min-width:40px;}
.ni.active{color:#fff;background:rgba(255,255,255,.09);}
.ni i{font-size:.92rem;}
.ni span{font-size:.5rem;font-weight:700;letter-spacing:.6px;text-transform:uppercase;}
</style>
</head>
<body>
<div class="layout">
  <div class="topbar">
    <a class="back" href="/dashboard"><i class="fa-solid fa-chevron-left"></i></a>
    <div class="tb-center">
      <div class="tb-title" id="aiTitle">ChatGPT</div>
      <div class="tb-sub" id="aiSub">AI filtered — aman untuk semua</div>
    </div>
    <div class="mode-row">
      <div class="mode-btn active-gpt" id="mGpt" onclick="setMode('gpt')">GPT</div>
      <div class="mode-btn" id="mWorm" onclick="setMode('worm')">WORM</div>
    </div>
    <div class="clear-btn" onclick="clearChat()"><i class="fa-solid fa-trash-can"></i></div>
  </div>

  <div class="msgs" id="msgs">
    <div class="welcome" id="welcomeBox">
      <div class="wico"><i class="fa-solid fa-brain"></i></div>
      <div class="w-title">AI Assistant</div>
      <div class="w-sub">Astro CRM v3.0 — Powered by AI<br>Pilih mode GPT atau WORM</div>
      <div class="quick-list">
        <div class="qp" onclick="quickSend(this)">Apa itu SQL Injection?</div>
        <div class="qp" onclick="quickSend(this)">Cara bypass Cloudflare protection?</div>
        <div class="qp" onclick="quickSend(this)">Buat script Python untuk parsing data</div>
        <div class="qp" onclick="quickSend(this)">Jelaskan cara kerja XSS attack</div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea class="ai-input" id="aiInput" placeholder="Ketik pesan..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMsg()"><i class="fa-solid fa-paper-plane"></i></button>
    </div>
  </div>
</div>

<nav class="navbar" id="nb"></nav>

<script>
const NAVS = [
  { h:'/dashboard', l:'Home',   i:'fa-solid fa-house' },
  { h:'/bugsender', l:'Bug',    i:'fa-brands fa-whatsapp' },
  { h:'/ddos',      l:'DDoS',   i:'fa-solid fa-shield-halved' },
  { h:'/toolscain', l:'Tools',  i:'fa-solid fa-wrench' },
  { h:'/ai',        l:'AI',     i:'fa-solid fa-brain' },
  { h:'/addsender', l:'Sender', i:'fa-solid fa-mobile-screen' },
  { h:'/change',    l:'More',   i:'fa-solid fa-bars' },
];
document.getElementById('nb').innerHTML = NAVS.map(n =>
  `<a class="ni${n.h===location.pathname?' active':''}" href="${n.h}"><i class="${n.i}"></i><span>${n.l}</span></a>`
).join('');

let curMode  = 'gpt';
let busy     = false;

function setMode(m) {
  curMode = m;
  const g = document.getElementById('mGpt'), w = document.getElementById('mWorm');
  const t = document.getElementById('aiTitle'), s = document.getElementById('aiSub');
  const inp = document.getElementById('aiInput');
  if (m === 'gpt') {
    g.className = 'mode-btn active-gpt'; w.className = 'mode-btn';
    t.textContent = 'ChatGPT'; s.textContent = 'AI filtered — aman untuk semua';
    inp.placeholder = 'Tanya apa saja...';
  } else {
    g.className = 'mode-btn'; w.className = 'mode-btn active-worm';
    t.textContent = 'WormGPT'; s.textContent = 'AI unfiltered — tanpa batasan';
    inp.placeholder = 'No limits mode...';
  }
}

function fmt() {
  const n = new Date();
  return n.getHours().toString().padStart(2,'0') + ':' + n.getMinutes().toString().padStart(2,'0');
}

function esc(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 110) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}

function appendMsg(role, content, mode) {
  const wb = document.getElementById('welcomeBox');
  if (wb) wb.remove();
  const msgs = document.getElementById('msgs');
  const div  = document.createElement('div');
  div.className = 'msg ' + role + (mode === 'worm' ? ' worm' : '');
  const avHtml = role === 'user'
    ? '<div class="av"><i class="fa-solid fa-user"></i></div>'
    : '<div class="av"><i class="fa-solid fa-brain"></i></div>';
  div.innerHTML = avHtml + '<div><div class="bubble">' + esc(content) + '</div><div class="msg-time">' + fmt() + '</div></div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const wb = document.getElementById('welcomeBox');
  if (wb) wb.remove();
  const msgs = document.getElementById('msgs');
  const div  = document.createElement('div');
  div.className = 'msg bot'; div.id = 'typingDiv';
  div.innerHTML = '<div class="av"><i class="fa-solid fa-brain"></i></div><div><div class="typing"><div class="td"></div><div class="td"></div><div class="td"></div></div></div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typingDiv');
  if (el) el.remove();
}

function quickSend(el) {
  document.getElementById('aiInput').value = el.textContent;
  sendMsg();
}

async function sendMsg() {
  const input = document.getElementById('aiInput');
  const text  = input.value.trim();
  if (!text || busy) return;
  input.value = ''; input.style.height = 'auto'; busy = true;
  document.getElementById('sendBtn').disabled = true;
  appendMsg('user', text);
  showTyping();
  try {
    const d = await fetch('/api/chat', {
      method : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body   : JSON.stringify({ message: text, mode: curMode }),
    }).then(r => r.json());
    removeTyping();
    if (d.success) appendMsg('bot', d.response || 'Tidak ada respons', curMode);
    else appendMsg('bot', 'Error: ' + (d.error || 'Terjadi kesalahan'), curMode);
  } catch {
    removeTyping();
    appendMsg('bot', 'Koneksi gagal. Coba lagi.', curMode);
  }
  busy = false;
  document.getElementById('sendBtn').disabled = false;
}

async function clearChat() {
  document.getElementById('msgs').innerHTML = `
    <div class="welcome" id="welcomeBox">
      <div class="wico"><i class="fa-solid fa-brain"></i></div>
      <div class="w-title">Chat Baru</div>
      <div class="w-sub">Riwayat chat dihapus.</div>
      <div class="quick-list">
        <div class="qp" onclick="quickSend(this)">Apa itu SQL Injection?</div>
        <div class="qp" onclick="quickSend(this)">Cara bypass Cloudflare protection?</div>
        <div class="qp" onclick="quickSend(this)">Buat script Python untuk parsing data</div>
        <div class="qp" onclick="quickSend(this)">Jelaskan cara kerja XSS attack</div>
      </div>
    </div>`;
  try { await fetch('/api/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ clearHistory: true }) }); } catch {}
}

async function loadHistory() {
  try {
    const d = await fetch('/api/chat/history').then(r => r.json());
    if (!d.history?.length) return;
    for (const m of d.history) appendMsg(m.role === 'assistant' ? 'bot' : 'user', m.content);
  } catch {}
}

async function init() {
  const s = await fetch('/api/session').then(r => r.json());
  if (!s.loggedIn) { location.href = '/'; return; }
  await loadHistory();
  // Adjust bottom padding for navbar
  document.querySelector('.input-area').style.paddingBottom = 'calc(4.5rem + env(safe-area-inset-bottom))';
}
init();
</script>
</body>
</html>
